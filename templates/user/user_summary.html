{% extends 'base_layout/base_user.html' %}

{% block title %} Summary {% endblock %}

{% block user_dashboard %}
<div class="container mt-5">
    <h2 class="text-center mb-4">{{ fullname }}'s Summary</h2>

    <!-- Summary Cards -->
    <div class="row justify-content-center text-center mb-4">
        <div class="col-sm-3">
            <div class="card shadow p-3">
                <h5>Total Bookings</h5>
                <p class="fw-bold fs-4">{{ total_bookings }}</p>
            </div>
        </div>
        <div class="col-sm-3">
            <div class="card shadow p-3">
                <h5>Total Cost</h5>
                <p class="fw-bold fs-4">₹{{ total_cost }}</p>
            </div>
        </div>
        <div class="col-sm-3">
            <div class="card shadow p-3">
                <h5>Average Cost</h5>
                <p class="fw-bold fs-4">₹{{ avg_cost }}</p>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="row">
        <!-- Cost Over Time Chart -->
        <div class="col-md-6 col-sm-12 mb-4">
            <div class="card p-3" style="height: 350px;">
                <canvas id="userCostChart" style="max-height: 300px;"></canvas>
            </div>
        </div>

        <!-- Location Usage Pie Chart -->
        <div class="col-md-6 col-sm-12 mb-4">
            <div class="card p-3" style="height: 350px;">
                <canvas id="locationChart" style="max-height: 300px;"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- Chart.js Script -->
<script>
    const costCtx = document.getElementById('userCostChart').getContext('2d');
    new Chart(costCtx, {
        type: 'line',
        data: {
            labels: {{ labels|tojson }},
            datasets: [{
                label: 'Your Parking Costs Over Time',
                data: {{ values|tojson }},
                backgroundColor: 'rgba(75, 192, 192, 0.4)',
                borderColor: 'rgba(75, 192, 192, 1)',
                tension: 0.4,
                fill: true,
                borderWidth: 2
            }]
        },
        options: {
            scales: { y: { beginAtZero: true } }
        }
    });
    
    const locCtx = document.getElementById('locationChart').getContext('2d');
    new Chart(locCtx, {
        type: 'pie',
        data: {
            labels: {{ location_labels|tojson }},
            datasets: [{
                label: 'Usage by Location',
                data: {{ location_counts|tojson }},
                backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF'],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true
        }
    });
</script>

{% endblock %}
