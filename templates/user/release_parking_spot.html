<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release Parking spot </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body style="background-color: #d9d9dd;">
    <div class="container">
        <div class="login-container">
            <h2 class="heading">Release Parking Spot</h2>

            <form action="{{url_for('release_spot',reservation_id=reservation.id)}}" method="POST">
                <div class="mb-3">
                    <label for="id" class="form-label">Spot Id : </label>
                    <input type="text" id="id" value="{{reservation.spot_id}}" class="form-control" disabled readonly>
                </div>
                <div class="mb-3">
                    <label for="customerId" class="form-label">Vehicle Number .: </label>
                    <input type="text" id="CustomerId" value="{{reservation.vehicle_no}}" class="form-control" disabled readonly>
                </div>
                <div class="mb-3">
                    <label for="vehicleNo" class="form-label">Parking Time : </label>
                    <input type="text" id="vehicleNo" value="{{reservation.parking_timestamp}}" class="form-control" disabled readonly>
                </div>
                <div class="mb-3">
                    <label for="date" class="form-label">Releasing time :  </label>
                    <input type="text" id="date" value="{{leaving_timestamp }}" class="form-control" disabled readonly>
                </div>
                <div class="mb-3">
                    <label for="cost" class="form-label">Total Cost </label>
                    <input type="text" id="cost" value="{{ '%.2f'|format(reservation.total_cost) if reservation.total_cost else 'N/A' }}" class="form-control" disabled readonly>
                </div>
                <div class="submit-btn text-center">
                    <button type="submit" class="btn btn-primary ">Release</button>
                    <a href="{{url_for('user_dashboard')}}" type="cancel" class="btn btn-secondary ms-5 ">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</body>

</html>
