<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Parking spot </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body style="background-color: #d9d9dd;">
    <div class="container">
        <div class="login-container">
            <h2 class="heading">Book Parking Spot </h2>

            <form action="{{ url_for('book_spot',lot_id=available_spot.lot_id)}}" method="POST" >
                <div class="mb-3">
                    <label for="id" class="form-label">Spot Id : </label>
                    <input type="text" id="id" value="{{available_spot.id}}" class="form-control" disabled readonly>
                </div>
                <div class="mb-3">
                    <label for="lotid" class="form-label">Lot_Id </label>
                    <input type="text" id="lotid" value="{{available_spot.lot_id}}" class="form-control" disabled readonly>
                </div>
                <div class="mb-3">
                    <label for="userID" class="form-label">User ID : </label>
                    <input type="text" id="UserID" value="{{user_id}}" class="form-control" disabled readonly>
                </div>
                <div class="mb-3">
                    <label for="vehicleNo" class="form-label">Vehicle No. : </label>
                    <input type="text" id="date"  class="form-control" name="vehicleNo" required>
                </div>
               
                <div class="submit-btn text-center">
                    <button  type="submit" class="btn btn-primary ">Reserve</button>
                    <a href="{{url_for('user_dashboard')}}" type="cancel" class="btn btn-secondary ms-5 ">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</body>

</html>
