<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View/Delete Parking Lot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body style="background-color: #d9d9dd;">
    <div class="container">
        <div class="login-container">
            <h2 class="heading">View/Delete Parking Spot </h2>
            <p class="text-black-50">Please Enter Details</p>
            
            <form action="#" method="POST">
        
                <div class="mb-3">
                    <label for="id" class="form-label">Id</label>
                    <input class="form-control " type="number" value="{{spot.id}}" disabled readonly>
                </div>
                <div class="mb-4 d-flex align-items-center">
                    <span class="me-2">Status:</span>
                    {% if spot.status == 'A' %}
                    <span class="badge bg-success">Available</span>
                    {% else %}
                    <span class="badge bg-secondary">Occupied</span>
                     <a href="{{url_for('occupied_spot_detail',spot_id=spot.id)}}"  class="ms-2 text-muted">click to see details</a>
                    {% endif %}
                   
                </div>

                <div class="submit-btn text-center">
                    {% if spot.status == 'A' %}
                    <button type="submit" class="btn btn-danger ">Delete</button>
                    {% else %}
                    <button type="submit" class="btn btn-danger" disabled>Delete</button>
                    {% endif %}
                    <a href="{{ url_for('admin_dashboard')}}" type="cancel" class="btn btn-secondary ms-5 ">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
