<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Parking Lot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body style="background-color: #d9d9dd;">
    <div class="container">
        <div class="login-container">
            <h2 class="heading">Occupied Parking Spot Details </h2>

            <form >
                <div class="mb-3">
                    <label for="id" class="form-label">Id : </label>
                    <input type="text" id="id" value="{{reservation.id}}" class="form-control" disabled readonly>
                </div>
                <div class="mb-3">
                    <label for="customerId" class="form-label">Customer Id: </label>
                    <input type="text" id="CustomerId" value="{{reservation.user_id}}" class="form-control" disabled readonly>
                </div>
                <div class="mb-3">
                    <label for="vehicleNo" class="form-label">Vehicle No. : </label>
                    <input type="text" id="vehicleNo" value="{{reservation.vehicle_no}}" class="form-control" disabled readonly>
                </div>
                <div class="mb-3">
                    <label for="date" class="form-label">Date of Parking </label>
                    <input type="text" id="date" value="{{reservation.parking_timestamp}}" class="form-control" disabled readonly>
                </div>
                <div class="mb-3">
                    <label for="cost" class="form-label">Est. Parking Cost per hour </label>
                    <input type="text" id="cost" value="{{reservation.cost_per_hour}}" class="form-control" disabled readonly>
                </div>
                <div class="submit-btn text-center">
                    <a  href="{{url_for('view_spot_detail',spot_id=reservation.spot_id)}}" type="cancel" class="btn btn-secondary  ">Close</a>
                </div>

            </form>
        </div>
    </div>
</body>

</html>
